name: Build CechCore binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BINARYBUILDER_AUTOMATIC_APPLE: "true"
      BINARYBUILDER_RUNNER: "privileged"
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.10'

      - name: Install BinaryBuilder
        run: julia -e 'using Pkg; Pkg.add("BinaryBuilder")'

      - name: Build tarballs
        run: julia --project=@v1 jll/build_recipe/build_tarballs.jl --verbose

      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: CechCore-tarballs
          path: products/*.tar.gz

      - name: Upload Artifacts.toml
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts-toml
          path: Artifacts.toml
